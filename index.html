// ── IndexedDB image store (big storage) ──
let _db=null;
function openDB(){return new Promise((res,rej)=>{if(_db)return res(_db);const r=indexedDB.open("mtr-images",1);r.onupgradeneeded=()=>{r.result.createObjectStore("imgs");};r.onsuccess=()=>{_db=r.result;res(_db);};r.onerror=()=>rej(r.error);});}
async function idbPut(id,blob){const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction("imgs","readwrite");tx.objectStore("imgs").put(blob,id);tx.oncomplete=()=>res(true);tx.onerror=()=>rej(tx.error);});}
async function idbGet(id){const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction("imgs","readonly");const rq=tx.objectStore("imgs").get(id);rq.onsuccess=()=>res(rq.result||null);rq.onerror=()=>rej(rq.error);});}
async function idbDelete(id){const db=await openDB();return new Promise((res)=>{const tx=db.transaction("imgs","readwrite");tx.objectStore("imgs").delete(id);tx.oncomplete=()=>res(true);tx.onerror=()=>res(false);});}
async function idbAll(){const db=await openDB();return new Promise((res)=>{const tx=db.transaction("imgs","readonly");const store=tx.objectStore("imgs");const keys=store.getAllKeys();const vals=store.getAll();let k,v;keys.onsuccess=()=>k=keys.result;vals.onsuccess=()=>v=vals.result;tx.oncomplete=()=>{const o={};k.forEach((key,i)=>o[key]=v[i]);res(o);};tx.onerror=()=>res({});});}

// in-memory cache of data URLs (data URLs never expire, unlike object URLs)
const _urlCache={};
async function getImgUrl(id){if(!id)return null;if(_urlCache[id])return _urlCache[id];try{const v=await idbGet(id);if(!v)return null;const url=(typeof v==="string")?v:URL.createObjectURL(v);_urlCache[id]=url;return url;}catch{return null;}}

// compress and return a data URL string (stored directly in IndexedDB)
function compressImage(file,maxDim=900,quality=0.82){
  return new Promise((res,rej)=>{const reader=new FileReader();reader.onload=e=>{const img=new Image();img.onload=()=>{let{width,height}=img;if(width>height){if(width>maxDim){height=height*maxDim/width;width=maxDim;}}else{if(height>maxDim){width=width*maxDim/height;height=maxDim;}}const c=document.createElement("canvas");c.width=width;c.height=height;c.getContext("2d").drawImage(img,0,0,width,height);res(c.toDataURL("image/jpeg",quality));};img.onerror=rej;img.src=e.target.result;};reader.onerror=rej;reader.readAsDataURL(file);});
}

function nowStamp(){const d=new Date();const p=n=>String(n).padStart(2,"0");return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}_${p(d.getHours())}시${p(d.getMinutes())}분`;}

// ── DIARY: 새벽 4시 기준 "오늘" 계산 ──
// 4시 이전이면 전날로 친다
function diaryDateKey(date=new Date()){
  const d=new Date(date.getTime());
  if(d.getHours()<4) d.setDate(d.getDate()-1);
  const p=n=>String(n).padStart(2,"0");
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
}
function fmtDiaryDate(key){if(!key||typeof key!=="string"||!key.includes("-"))return "날짜 없음";const[y,m,dd]=key.split("-").map(Number);const days=["일","월","화","수","목","금","토"];const dt=new Date(y,m-1,dd);if(isNaN(dt.getTime()))return "날짜 없음";return `${y}.${String(m).padStart(2,"0")}.${String(dd).padStart(2,"0")} (${days[dt.getDay()]})`;}
function dayDiff(k1,k2){if(!k1||!k2||!k1.includes("-")||!k2.includes("-"))return 0;const[a,b,c]=k1.split("-").map(Number);const[d,e,f]=k2.split("-").map(Number);return Math.round((new Date(d,e-1,f)-new Date(a,b-1,c))/86400000);}
// 연속 일수(불) 계산: 2일 연속 비면 0
function calcStreak(entries){
  if(!entries.length)return 0;
  const keys=[...new Set(entries.map(e=>e.dateKey))].sort();
  const today=diaryDateKey();
  // 가장 최근 기록이 오늘 또는 어제(=1일 공백 허용)가 아니면 끊김
  const last=keys[keys.length-1];
  const gapFromToday=dayDiff(last,today);
  if(gapFromToday>=2)return 0; // 2일 이상 비었으면 초기화
  let streak=1;
  for(let i=keys.length-1;i>0;i--){
    const gap=dayDiff(keys[i-1],keys[i]);
    if(gap===1)streak++;
    else if(gap>=2)break; // 2일 이상 공백 → 끊김
    // gap===0(같은 날 중복)은 무시하고 계속
  }
  return streak;
}

function blobToDataUrl(b){return new Promise((res)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.readAsDataURL(b);});}
function dataUrlToBlob(d){const[meta,b64]=d.split(",");const mm=meta.match(/:(.*?);/);const mime=mm?mm[1]:"image/jpeg";const bin=atob(b64);const arr=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);return new Blob([arr],{type:mime});}

function Stars({value,onChange,size=14,T}){
  const [hov,setHov]=useState(0);
  const shown=hov||value||0;
  const empty=T?T.surface2:"#3F3F46";
  return <div style={{display:"flex",gap:2}}>{[1,2,3,4,5].map(n=>{
    const fill=shown>=n?1:(shown>=n-0.5?0.5:0); // 1 full, 0.5 half, 0 empty
    return <span key={n} style={{position:"relative",display:"inline-block",fontSize:size,lineHeight:1,cursor:onChange?"pointer":"default",width:size,height:size}}
      onMouseLeave={()=>onChange&&setHov(0)}>
      <span style={{position:"absolute",inset:0,color:empty}}>★</span>
      <span style={{position:"absolute",inset:0,color:"#FBBF24",width:fill===1?"100%":fill===0.5?"50%":"0%",overflow:"hidden"}}>★</span>
      {onChange&&<>
        <span onClick={()=>onChange(value===n-0.5?0:n-0.5)} onMouseEnter={()=>setHov(n-0.5)} style={{position:"absolute",left:0,top:0,width:"50%",height:"100%",zIndex:2}}/>
        <span onClick={()=>onChange(value===n?0:n)} onMouseEnter={()=>setHov(n)} style={{position:"absolute",right:0,top:0,width:"50%",height:"100%",zIndex:2}}/>
      </>}
    </span>;
  })}</div>;
}

function Cover({imgId,ratio,ft,size,radius=10}){
  const [url,setUrl]=useState(null);
  useEffect(()=>{let ok=true;getImgUrl(imgId).then(u=>{if(ok)setUrl(u);});return()=>{ok=false;};},[imgId]);
  return <div style={{width:"100%",aspectRatio:ratio,borderRadius:radius,overflow:"hidden",background:`${ft.color}12`,display:"flex",alignItems:"center",justifyContent:"center",border:`1px solid ${ft.color}22`}}>
    {url?<img src={url} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span style={{fontSize:size||32}}>{ft.emoji}</span>}</div>;
}

function CoverUpload({imgId,ratio,onChange,onError,T}){
  const ref=useRef();const [url,setUrl]=useState(null);const [loading,setLoading]=useState(false);
  useEffect(()=>{let ok=true;getImgUrl(imgId).then(u=>{if(ok)setUrl(u);});return()=>{ok=false;};},[imgId]);
  const handle=async(e)=>{const f=e.target.files[0];if(!f)return;setLoading(true);try{const dataUrl=await compressImage(f);const id=uid();await idbPut(id,dataUrl);_urlCache[id]=dataUrl;setUrl(dataUrl);onChange(id);}catch(err){onError&&onError("이미지를 저장할 수 없어요. 공간을 확인해주세요.");}setLoading(false);};
  return <div onClick={()=>!loading&&ref.current.click()} style={{width:"100%",aspectRatio:ratio,borderRadius:12,overflow:"hidden",background:T.inputBg,border:`1.5px dashed ${T.borderStrong}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
    {loading?<div style={{color:T.dim2,fontSize:12}}>처리 중...</div>:url?<img src={url} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6,color:T.dim}}><span style={{fontSize:28}}>📸</span><span style={{fontSize:11,fontFamily:"'Noto Sans KR',sans-serif"}}>갤러리에서 선택</span></div>}
    <input ref={ref} type="file" accept="image/*" onChange={handle} style={{display:"none"}}/>
  </div>;
}

function PinModal({onConfirm,onCancel,mode="enter",title="PIN 입력",T}){

  const del=()=>{if(mode==="set"&&step===2)setConfirm(c=>c.slice(0,-1));else setPin(p=>p.slice(0,-1));};

        <div style={{background:T.cardBg,borderRadius:14,border:`1px solid ${T.border}`,padding:"14px"}}><div style={{fontSize:11,color:T.dim2}}>남은 돈</div><div style={{fontSize:16,fontWeight:700,color:income-expense>=0?T.text:"#F87171",fontFamily:"'Noto Serif KR',serif",marginTop:3}}>{wonFmt(income-expense)}</div></div>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        <button onClick={onOpenStats} style={{flex:1,background:T.cardBg,border:`1px solid ${T.border}`,borderRadius:10,color:T.muted,padding:"9px",fontSize:12.5,fontWeight:600,cursor:"pointer"}}>📊 통계</button>
        <button onClick={onManageBudget} style={{flex:1,background:T.cardBg,border:`1px solid ${T.border}`,borderRadius:10,color:T.muted,padding:"9px",fontSize:12.5,fontWeight:600,cursor:"pointer"}}>🎯 예산</button>
      </div>
      {/* 예산 진행바 */}
      {budgetRows.length>0&&<div style={{background:T.cardBg,border:`1px solid ${T.border}`,borderRadius:14,padding:"14px 16px",marginBottom:14,display:"flex",flexDirection:"column",gap:11}}>
        <div style={{fontSize:12,fontWeight:700,color:T.muted}}>🎯 예산</div>
        {budgetRows.map(r=>{const pct=Math.min(r.spent/r.budget*100,100);const over=r.spent>r.budget;return <div key={r.k}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}}><span style={{color:T.text}}>{r.cat.emoji} {r.cat.label}</span><span style={{color:over?"#F87171":T.dim2}}>{wonFmt(r.spent)} / {wonFmt(r.budget)}</span></div>
          <div style={{height:7,background:T.inputBg,borderRadius:4,overflow:"hidden"}}><div style={{width:`${pct}%`,height:"100%",background:over?"#F87171":LG,borderRadius:4,transition:"width .4s"}}/></div>
          {over&&<div style={{fontSize:10.5,color:"#F87171",marginTop:3}}>예산 {wonFmt(r.spent-r.budget)} 초과</div>}
        </div>;})}
      </div>}
      {/* 검색 */}
      {entries.length>0&&<input value={q} onChange={e=>setQ(e.target.value)} placeholder="🔍 메모, 카테고리 검색..." style={{width:"100%",background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:12,color:T.text,padding:"11px 14px",fontSize:14,outline:"none",boxSizing:"border-box",marginBottom:14}}/>}
      {sorted.length===0
        ?<div style={{textAlign:"center",padding:"50px 20px",color:T.dim}}><div style={{fontSize:40,marginBottom:10}}>{q?"🔍":"💸"}</div><div style={{fontSize:14,color:T.dim2}}>{q?"검색 결과가 없어요":"아직 기록이 없어요"}</div>{!q&&<div style={{fontSize:12,marginTop:6}}>+ 기록 버튼으로 추가해보세요</div>}</div>
        :<div style={{display:"flex",flexDirection:"column",gap:8}}>{sorted.map(e=>{
          if(e.lType==="transfer"){return <div key={e.id} onClick={()=>onEditEntry(e)} style={{background:T.cardBg,border:`1px solid ${T.border}`,borderRadius:12,padding:"12px 14px",display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}>
            <div style={{width:38,height:38,borderRadius:10,background:"rgba(59,130,246,0.13)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>🔄</div>
            <div style={{flex:1,minWidth:0}}><div style={{fontSize:14,fontWeight:600,color:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.memo||"이체"}</div><div style={{fontSize:11,color:T.dim2,marginTop:2}}>{accName(e.fromAccount)} → {accName(e.toAccount)} · {e.lDate||""}</div></div>
            <div style={{fontSize:14,fontWeight:700,color:"#3B82F6",flexShrink:0,fontFamily:"'Noto Serif KR',serif"}}>{wonFmt(e.amount)}</div>
            <button onClick={ev=>{ev.stopPropagation();onDeleteEntry(e.id);}} style={{flexShrink:0,width:26,height:26,borderRadius:7,border:"none",background:"rgba(190,30,30,0.1)",color:"#F87171",fontSize:11,cursor:"pointer"}}>✕</button>
          </div>;}
          const cat=ledgerCat(e.lType,e.lCat,customCats);const isInc=e.lType==="income";return <div key={e.id} onClick={()=>onEditEntry(e)} style={{background:T.cardBg,border:`1px solid ${T.border}`,borderRadius:12,padding:"12px 14px",display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}>
          <div style={{width:38,height:38,borderRadius:10,background:isInc?`${LG}18`:"rgba(248,113,113,0.12)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{e.isFixed?"🔄":cat.emoji}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:14,fontWeight:600,color:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.memo||cat.label}{e.isFixed?" (고정)":""}</div>
            <div style={{fontSize:11,color:T.dim2,marginTop:2}}>{cat.label}{e.account?` · ${accName(e.account)}`:""} · {e.lDate||""}</div>
          </div>
          <div style={{fontSize:15,fontWeight:700,color:isInc?LG:"#F87171",flexShrink:0,fontFamily:"'Noto Serif KR',serif"}}>{isInc?"+":"-"}{wonFmt(e.amount)}</div>
          <button onClick={ev=>{ev.stopPropagation();onDeleteEntry(e.id);}} style={{flexShrink:0,width:26,height:26,borderRadius:7,border:"none",background:"rgba(190,30,30,0.1)",color:"#F87171",fontSize:11,cursor:"pointer"}}>✕</button>
        </div>;})}</div>}
    </div>
  </div>;
}

// 거래 입력 모달
function LedgerEntryModal({entry,subId,accounts,customCats,onManageCats,onSave,onClose,T}){
  const [lType,setLType]=useState(entry?.lType||"expense");
  const [lCat,setLCat]=useState(entry?.lCat||"food");
  const [amount,setAmount]=useState(entry?.amount?String(entry.amount):"");
  const [memo,setMemo]=useState(entry?.memo||"");
  const [lDate,setLDate]=useState(entry?.lDate||new Date().toISOString().slice(0,10));
  const accs=accounts&&accounts.length?accounts:[];
  const [account,setAccount]=useState(entry?.account||(accs[0]?accs[0].id:null));
  const [fromAccount,setFromAccount]=useState(entry?.fromAccount||(accs[0]?accs[0].id:null));
  const [toAccount,setToAccount]=useState(entry?.toAccount||(accs[1]?accs[1].id:(accs[0]?accs[0].id:null)));
  const cats=lType==="transfer"?[]:getCats(lType,customCats);
  useEffect(()=>{if(lType!=="transfer"&&!cats.find(c=>c.k===lCat))setLCat(cats[0]?.k);},[lType]);
  const lbl={fontSize:11,fontWeight:600,color:T.muted,letterSpacing:"0.06em",marginBottom:8,display:"block"};
  const inp={width:"100%",background:T.inputBg,border:`1px solid ${T.borderStrong}`,borderRadius:12,color:T.text,padding:"12px 14px",fontSize:15,outline:"none",boxSizing:"border-box",fontFamily:"'Noto Sans KR',sans-serif"};
  const canTransfer=accs.length>=2;
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:500,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(6px)"}} onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div style={{background:T.surface,borderRadius:"24px 24px 0 0",width:"100%",maxWidth:520,maxHeight:"93vh",padding:"20px 20px 36px",overflowY:"auto",display:"flex",flexDirection:"column",gap:16,animation:"slideUp .3s cubic-bezier(.32,1.1,.58,1) both"}}>
      <div style={{width:40,height:4,background:T.surface2,borderRadius:2,margin:"0 auto"}}/>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontFamily:"'Noto Serif KR',serif",fontSize:18,fontWeight:700,color:T.text}}>💰 {entry?"기록 수정":"새 기록"}</span><button onClick={onClose} style={{background:T.surface2,border:"none",borderRadius:"50%",width:30,height:30,color:T.muted,fontSize:16,cursor:"pointer"}}>✕</button></div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>setLType("expense")} style={{flex:1,padding:"12px",borderRadius:12,fontSize:14,fontWeight:700,cursor:"pointer",border:`1px solid ${lType==="expense"?"#F87171":T.border}`,background:lType==="expense"?"rgba(248,113,113,0.15)":"transparent",color:lType==="expense"?"#F87171":T.dim2}}>지출</button>
        <button onClick={()=>setLType("income")} style={{flex:1,padding:"12px",borderRadius:12,fontSize:14,fontWeight:700,cursor:"pointer",border:`1px solid ${lType==="income"?LG:T.border}`,background:lType==="income"?`${LG}22`:"transparent",color:lType==="income"?LG:T.dim2}}>수입</button>
        {canTransfer&&<button onClick={()=>setLType("transfer")} style={{flex:1,padding:"12px",borderRadius:12,fontSize:14,fontWeight:700,cursor:"pointer",border:`1px solid ${lType==="transfer"?"#3B82F6":T.border}`,background:lType==="transfer"?"rgba(59,130,246,0.15)":"transparent",color:lType==="transfer"?"#3B82F6":T.dim2}}>이체</button>}
      </div>
      <div><label style={lbl}>금액</label><input value={commaFmt(amount)} onChange={e=>setAmount(e.target.value.replace(/[^0-9]/g,""))} inputMode="numeric" placeholder="0" style={{...inp,fontSize:20,fontWeight:700,textAlign:"right"}}/>{amount&&<div style={{textAlign:"right",fontSize:12,color:T.dim2,marginTop:4}}>{wonFmt(Number(amount))}</div>}</div>
      {lType==="transfer"
        ?<div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
          <div style={{flex:1}}><label style={lbl}>보내는 계좌</label><select value={fromAccount} onChange={e=>setFromAccount(e.target.value)} style={{...inp,cursor:"pointer"}}>{accs.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}</select></div>
          <div style={{paddingBottom:12,color:"#3B82F6",fontSize:18}}>→</div>
          <div style={{flex:1}}><label style={lbl}>받는 계좌</label><select value={toAccount} onChange={e=>setToAccount(e.target.value)} style={{...inp,cursor:"pointer"}}>{accs.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}</select></div>
        </div>
        :<>
        {accs.length>0&&<div><label style={lbl}>계좌</label><div style={{display:"flex",flexWrap:"wrap",gap:8}}>{accs.map(a=><button key={a.id} onClick={()=>setAccount(a.id)} style={{padding:"8px 14px",borderRadius:10,fontSize:13,fontWeight:600,cursor:"pointer",border:`1px solid ${account===a.id?a.color:T.border}`,background:account===a.id?`${a.color}1f`:"transparent",color:account===a.id?a.color:T.dim2}}>💳 {a.name}</button>)}</div></div>}
        <div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><label style={{...lbl,marginBottom:0}}>카테고리</label><button onClick={onManageCats} style={{background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:7,color:T.muted,padding:"3px 9px",fontSize:11,cursor:"pointer"}}>+ 편집</button></div><div style={{display:"flex",flexWrap:"wrap",gap:8}}>{cats.map(c=><button key={c.k} onClick={()=>setLCat(c.k)} style={{padding:"8px 12px",borderRadius:10,fontSize:13,fontWeight:600,cursor:"pointer",border:`1px solid ${lCat===c.k?LG:T.border}`,background:lCat===c.k?`${LG}1a`:"transparent",color:lCat===c.k?LG:T.dim2}}>{c.emoji} {c.label}</button>)}</div></div>
        </>}
      <div><label style={lbl}>날짜</label><input type="date" value={lDate} onChange={e=>setLDate(e.target.value)} style={{...inp,cursor:"pointer"}}/></div>
      <div><label style={lbl}>메모 <span style={{color:T.dim,fontWeight:400}}>(선택)</span></label><input value={memo} onChange={e=>setMemo(e.target.value)} placeholder={lType==="transfer"?"예: 비상금 이체":"예: 점심 김밥"} style={inp}/></div>
      <button onClick={()=>{
        if(!amount||Number(amount)<=0)return;
        if(lType==="transfer"){if(fromAccount===toAccount)return;onSave({id:entry?.id||uid(),ledgerSubId:entry?.ledgerSubId||subId,_kind:"ledgerEntry",lType:"transfer",fromAccount,toAccount,amount:Number(amount),memo:memo.trim(),lDate,createdAt:entry?.createdAt||new Date().toISOString()});}
        else onSave({id:entry?.id||uid(),ledgerSubId:entry?.ledgerSubId||subId,_kind:"ledgerEntry",lType,lCat,account,amount:Number(amount),memo:memo.trim(),lDate,isFixed:entry?.isFixed||false,createdAt:entry?.createdAt||new Date().toISOString()});
      }} style={{padding:"14px",borderRadius:14,border:"none",background:lType==="transfer"?"linear-gradient(135deg,#3B82F6,#2563EB)":`linear-gradient(135deg,${LG},#4A8C60)`,color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer"}}>{entry?"수정 완료":"저장하기"}</button>
    </div></div>;
}

// 고정 지출 관리 모달
function FixedExpenseModal({fixedExpenses,onSave,onClose,T}){
  const [list,setList]=useState(fixedExpenses||[]);
  const [name,setName]=useState("");
  const [amount,setAmount]=useState("");
  const [kind,setKind]=useState("expense");
  const inp={background:T.inputBg,border:`1px solid ${T.borderStrong}`,borderRadius:10,color:T.text,padding:"11px 12px",fontSize:14,outline:"none",boxSizing:"border-box",fontFamily:"'Noto Sans KR',sans-serif"};
  const add=()=>{if(!name.trim()||!amount||Number(amount)<=0)return;setList([...list,{id:uid(),name:name.trim(),amount:Number(amount),kind}]);setName("");setAmount("");};
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:500,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(6px)"}} onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div style={{background:T.surface,borderRadius:"24px 24px 0 0",width:"100%",maxWidth:520,maxHeight:"93vh",padding:"20px 20px 36px",overflowY:"auto",display:"flex",flexDirection:"column",gap:16,animation:"slideUp .3s cubic-bezier(.32,1.1,.58,1) both"}}>
      <div style={{width:40,height:4,background:T.surface2,borderRadius:2,margin:"0 auto"}}/>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontFamily:"'Noto Serif KR',serif",fontSize:18,fontWeight:700,color:T.text}}>🔄 고정 항목 (월정액·정기수입)</span><button onClick={onClose} style={{background:T.surface2,border:"none",borderRadius:"50%",width:30,height:30,color:T.muted,fontSize:16,cursor:"pointer"}}>✕</button></div>
      <div style={{fontSize:12,color:T.dim2,lineHeight:1.6,background:`${LG}10`,borderRadius:10,padding:"10px 12px"}}>💡 여기 등록한 고정 항목은 <b>새 가계부를 만들 때 자동으로 들어가요.</b> (넷플릭스·통신비 같은 고정지출, 월급·용돈 같은 정기수입)</div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {list.length===0&&<div style={{textAlign:"center",padding:"20px",color:T.dim,fontSize:13}}>아직 등록된 고정 항목이 없어요</div>}
        {list.map(f=>{const isInc=f.kind==="income";return <div key={f.id} style={{display:"flex",alignItems:"center",gap:10,background:T.inputBg,borderRadius:10,padding:"10px 12px"}}>
          <span style={{fontSize:18}}>{isInc?"💵":"🔄"}</span>
          <span style={{flex:1,fontSize:14,color:T.text,fontWeight:600}}>{f.name}</span>
          <span style={{fontSize:11,color:isInc?LG:"#F87171",fontWeight:600}}>{isInc?"수입":"지출"}</span>
          <span style={{fontSize:14,color:isInc?LG:"#F87171",fontWeight:700}}>{isInc?"+":"-"}{wonFmt(f.amount)}</span>
          <button onClick={()=>setList(list.filter(x=>x.id!==f.id))} style={{width:26,height:26,borderRadius:7,border:"none",background:"rgba(190,30,30,0.12)",color:"#F87171",fontSize:11,cursor:"pointer"}}>✕</button>
        </div>;})}
      </div>
      <div style={{borderTop:`1px solid ${T.border}`,paddingTop:14,display:"flex",flexDirection:"column",gap:8}}>
        <div style={{fontSize:11,fontWeight:600,color:T.muted}}>새 고정 항목 추가</div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>setKind("expense")} style={{flex:1,padding:"9px",borderRadius:9,fontSize:12.5,fontWeight:700,cursor:"pointer",border:`1px solid ${kind==="expense"?"#F87171":T.border}`,background:kind==="expense"?"rgba(248,113,113,0.13)":"transparent",color:kind==="expense"?"#F87171":T.dim2}}>고정 지출</button>
          <button onClick={()=>setKind("income")} style={{flex:1,padding:"9px",borderRadius:9,fontSize:12.5,fontWeight:700,cursor:"pointer",border:`1px solid ${kind==="income"?LG:T.border}`,background:kind==="income"?`${LG}1d`:"transparent",color:kind==="income"?LG:T.dim2}}>정기 수입</button>
        </div>
        <div style={{display:"flex",gap:8}}>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder={kind==="income"?"이름 (예: 월급)":"이름 (예: 넷플릭스)"} style={{...inp,flex:1,minWidth:0}}/>
          <input value={commaFmt(amount)} onChange={e=>setAmount(e.target.value.replace(/[^0-9]/g,""))} inputMode="numeric" placeholder="금액" style={{...inp,width:80,flexShrink:0}}/>
          <button onClick={add} style={{flexShrink:0,background:LG,border:"none",borderRadius:10,color:"#fff",padding:"0 14px",fontSize:14,fontWeight:700,cursor:"pointer"}}>+</button>
        </div>
      </div>
      <button onClick={()=>onSave(list)} style={{padding:"14px",borderRadius:14,border:"none",background:`linear-gradient(135deg,${LG},#4A8C60)`,color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer"}}>저장</button>
    </div></div>;
}

// 하위 폴더 생성 모달

function LedgerSubModal({onSave,onClose,fixedCount,T}){

  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:500,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(6px)"}} onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div style={{background:T.surface,borderRadius:"24px 24px 0 0",width:"100%",maxWidth:520,padding:"20px 20px 36px",display:"flex",flexDirection:"column",gap:16,animation:"slideUp .3s cubic-bezier(.32,1.1,.58,1) both"}}>
      <div style={{width:40,height:4,background:T.surface2,borderRadius:2,margin:"0 auto"}}/>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontFamily:"'Noto Serif KR',serif",fontSize:18,fontWeight:700,color:T.text}}>🧾 새 가계부</span><button onClick={onClose} style={{background:T.surface2,border:"none",borderRadius:"50%",width:30,height:30,color:T.muted,fontSize:16,cursor:"pointer"}}>✕</button></div>

// 가계부 통계 (월별·카테고리별)
function LedgerStats({sub,entries,customCats,onClose,wide,T}){
  const expenses=entries.filter(e=>e.lType==="expense");
  const incomes=entries.filter(e=>e.lType==="income");
  const totalExp=expenses.reduce((s,e)=>s+(e.amount||0),0);
  const totalInc=incomes.reduce((s,e)=>s+(e.amount||0),0);
  // 카테고리별 지출
  const byCat={};expenses.forEach(e=>{byCat[e.lCat]=(byCat[e.lCat]||0)+(e.amount||0);});
  const catRows=Object.entries(byCat).map(([k,v])=>({cat:ledgerCat("expense",k,customCats),amount:v,pct:totalExp?Math.round(v/totalExp*100):0})).sort((a,b)=>b.amount-a.amount);
  // 일자별(월 안에서) 지출 추이 — 날짜별 합
  const byDate={};expenses.forEach(e=>{if(e.lDate)byDate[e.lDate]=(byDate[e.lDate]||0)+(e.amount||0);});
  const dateKeys=Object.keys(byDate).sort();
  const maxDay=Math.max(...Object.values(byDate),1);
  const maxW=wide?760:520;
  return <div style={{position:"fixed",inset:0,background:T.bg,zIndex:450,overflowY:"auto",animation:"fadeIn .2s ease",maxWidth:maxW,margin:"0 auto"}}>
    <div style={{position:"sticky",top:0,zIndex:10,background:T.headerBg,backdropFilter:"blur(20px)",padding:"calc(env(safe-area-inset-top, 0px) + 14px) 20px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:`1px solid ${T.border}`}}>
      <button onClick={onClose} style={{background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:10,color:T.muted,padding:"8px 14px",fontSize:14,cursor:"pointer"}}>← 닫기</button>
      <div style={{fontFamily:"'Noto Serif KR',serif",fontSize:16,fontWeight:700,color:T.text}}>📊 {sub.title}</div>
      <div style={{width:60}}/>
    </div>
    <div style={{padding:wide?"28px 32px 80px":"20px 18px 60px",display:"flex",flexDirection:"column",gap:16}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <div style={{background:T.cardBg,borderRadius:14,border:`1px solid ${T.border}`,padding:"16px"}}><div style={{fontSize:11,color:T.dim2}}>총 지출</div><div style={{fontSize:20,fontWeight:700,color:"#F87171",fontFamily:"'Noto Serif KR',serif",marginTop:3}}>{wonFmt(totalExp)}</div></div>
        <div style={{background:T.cardBg,borderRadius:14,border:`1px solid ${T.border}`,padding:"16px"}}><div style={{fontSize:11,color:T.dim2}}>총 수입</div><div style={{fontSize:20,fontWeight:700,color:LG,fontFamily:"'Noto Serif KR',serif",marginTop:3}}>{wonFmt(totalInc)}</div></div>
      </div>
      {dateKeys.length>0&&<div style={{background:T.cardBg,borderRadius:14,border:`1px solid ${T.border}`,padding:"18px 16px"}}>
        <div style={{fontSize:12,fontWeight:700,color:T.text,marginBottom:14}}>📈 날짜별 지출</div>
        <div style={{display:"flex",alignItems:"flex-end",gap:4,height:110,overflowX:"auto"}}>
          {dateKeys.map(d=>{const h=(byDate[d]/maxDay)*88+4;return <div key={d} style={{flex:"1 0 22px",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}><div style={{width:"100%",maxWidth:28,height:`${h}px`,background:"linear-gradient(180deg,#F87171,#DC2626)",borderRadius:4}}/><div style={{fontSize:9,color:T.dim2,transform:"rotate(-45deg)",whiteSpace:"nowrap",marginTop:4}}>{d.slice(5)}</div></div>;})}
        </div>
      </div>}
      {catRows.length>0&&<div style={{background:T.cardBg,borderRadius:14,border:`1px solid ${T.border}`,padding:"18px 16px"}}>
        <div style={{fontSize:12,fontWeight:700,color:T.text,marginBottom:14}}>🗂️ 카테고리별 지출</div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {catRows.map(r=><div key={r.cat.k} style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:16,width:24}}>{r.cat.emoji}</span>
            <span style={{fontSize:13,color:T.text,width:70,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.cat.label}</span>
            <div style={{flex:1,height:9,background:T.inputBg,borderRadius:5,overflow:"hidden"}}><div style={{width:`${r.pct}%`,height:"100%",background:"#F87171",borderRadius:5,transition:"width .4s"}}/></div>
            <span style={{fontSize:12,color:T.dim2,width:90,textAlign:"right"}}>{wonFmt(r.amount)}</span>
          </div>)}
        </div>
      </div>}
      {entries.length===0&&<div style={{textAlign:"center",padding:"50px 20px",color:T.dim}}><div style={{fontSize:40,marginBottom:10}}>📊</div><div style={{fontSize:14,color:T.dim2}}>기록이 쌓이면 통계가 보여요</div></div>}
    </div>
  </div>;
}

function AuthScreen({onAuthed,onSkip,T}){
  const [mode,setMode]=useState("login"); // login | signup
  const [email,setEmail]=useState("");
  const [pw,setPw]=useState("");
  const [msg,setMsg]=useState("");
  const [loading,setLoading]=useState(false);
  const inp={width:"100%",background:T.inputBg,border:`1px solid ${T.borderStrong}`,borderRadius:12,color:T.text,padding:"13px 14px",fontSize:15,outline:"none",boxSizing:"border-box",fontFamily:"'Noto Sans KR',sans-serif"};
  const submit=async()=>{
    if(!sb){setMsg("연결을 불러오지 못했어요. 잠시 후 다시 시도해주세요.");return;}
    if(!email.trim()||!pw){setMsg("이메일과 비밀번호를 입력해주세요.");return;}
    setLoading(true);setMsg("");
    try{
      if(mode==="signup"){
        const {data,error}=await sb.auth.signUp({email:email.trim(),password:pw});
        if(error){setMsg(error.message.includes("already")?"이미 가입된 이메일이에요. 로그인해주세요.":"가입 실패: "+error.message);setLoading(false);return;}
        if(data.session){onAuthed(data.session.user);}
        else{setMsg("가입 완료! 이메일 인증이 필요할 수 있어요. 메일함을 확인하거나 바로 로그인해보세요.");setMode("login");}
      }else{
        const {data,error}=await sb.auth.signInWithPassword({email:email.trim(),password:pw});
        if(error){setMsg("로그인 실패: 이메일/비밀번호를 확인해주세요.");setLoading(false);return;}
        onAuthed(data.user);
      }
    }catch(e){setMsg("오류가 발생했어요. 다시 시도해주세요.");}
    setLoading(false);
  };
  return <div style={{minHeight:"100vh",background:T.bg,color:T.text,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,position:"relative",overflow:"hidden"}}>
    <div style={{position:"fixed",inset:0,pointerEvents:"none",background:"radial-gradient(circle 600px at 50% 30%, #7C3AED33, #7C3AED11 45%, transparent 70%)"}}/>
    <div style={{position:"relative",zIndex:1,width:"100%",maxWidth:360,display:"flex",flexDirection:"column",gap:16,alignItems:"center"}}>
      <div style={{fontSize:56}}>📖</div>
      <div style={{fontFamily:"'Noto Serif KR',serif",fontSize:28,fontWeight:700,letterSpacing:"0.08em"}}>GIROK</div>
      <div style={{fontSize:13,color:T.dim2,marginBottom:8,textAlign:"center"}}>{mode==="login"?"로그인하면 모든 기기에서 같은 기록을 볼 수 있어요":"새 계정을 만들어요"}</div>
      <input style={inp} type="email" placeholder="이메일" value={email} onChange={e=>setEmail(e.target.value)} autoCapitalize="none"/>
      <input style={inp} type="password" placeholder="비밀번호 (6자 이상)" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()}/>
      {msg&&<div style={{fontSize:12,color:msg.includes("완료")?"#34D399":"#F87171",textAlign:"center",lineHeight:1.5}}>{msg}</div>}
      <button onClick={submit} disabled={loading} style={{width:"100%",padding:"14px",borderRadius:14,border:"none",background:"linear-gradient(135deg,#7C3AED,#C084FC)",color:"#fff",fontSize:15,fontWeight:700,cursor:loading?"default":"pointer",opacity:loading?0.6:1,fontFamily:"'Noto Sans KR',sans-serif"}}>{loading?"처리 중...":mode==="login"?"로그인":"가입하기"}</button>
      <button onClick={()=>{setMode(mode==="login"?"signup":"login");setMsg("");}} style={{background:"none",border:"none",color:"#C084FC",fontSize:13,cursor:"pointer",fontFamily:"'Noto Sans KR',sans-serif"}}>{mode==="login"?"계정이 없어요 → 가입하기":"이미 계정이 있어요 → 로그인"}</button>
      <button onClick={onSkip} style={{background:"none",border:"none",color:T.dim,fontSize:12,cursor:"pointer",marginTop:4,fontFamily:"'Noto Sans KR',sans-serif"}}>로그인 없이 이 기기에서만 쓰기</button>
    </div>
  </div>;
}

function App(){
  const [data,setData]=useState(null);
  const [booting,setBooting]=useState(true);
  const [user,setUser]=useState(null);
  const [authChecked,setAuthChecked]=useState(false);
  const [showAuth,setShowAuth]=useState(false);
  const [syncing,setSyncing]=useState(false);
  const [syncFailed,setSyncFailed]=useState(false);
  const [settings,setSettings]=useState(loadSettings());
  const [view,setView]=useState("folders");
  const [activeFolderId,setActiveFolderId]=useState(null);
  const [unlockedFolders,setUnlockedFolders]=useState({});
  const [modal,setModal]=useState(null);
  const [editTarget,setEditTarget]=useState(null);
  const [pinTarget,setPinTarget]=useState(null);
  const [search,setSearch]=useState("");
  const [globalSearch,setGlobalSearch]=useState("");
  const [sortInline,setSortInline]=useState("newest");
  const [folderSort,setFolderSort]=useState("custom");
  const [filterType,setFilterType]=useState("all");
  const [filterRating,setFilterRating]=useState(0);
  const [showFilters,setShowFilters]=useState(false);
  const [toast,setToast]=useState(null);
  const [confirmCfg,setConfirmCfg]=useState(null);
  const [detailItem,setDetailItem]=useState(null);
  const [diaryDetail,setDiaryDetail]=useState(null);
  const [ledgerSub,setLedgerSub]=useState(null);
  const [renameSub,setRenameSub]=useState(null);
  const [ledgerStats,setLedgerStats]=useState(null);
  const [winW,setWinW]=useState(typeof window!=="undefined"?window.innerWidth:480);
  const T=THEMES[settings.theme]||THEMES.dark;

  useEffect(()=>{
    let d=loadData()||DEFAULT_DATA;
    // 데이터 무결성 보정 (깨진 데이터로 인한 크래시 방지)
    if(!d||typeof d!=="object")d={...DEFAULT_DATA};
    if(!Array.isArray(d.folders))d.folders=[...DEFAULT_DATA.folders];
    if(!Array.isArray(d.items))d.items=[];
    if(!d.folders.find(f=>f.id==="all"))d.folders.unshift({...DEFAULT_DATA.folders[0]});
    // 폴더 없는 고아 아이템, id 없는 아이템 정리 (가계부 거래는 ledgerSubId로 연결되므로 보존)
    const folderIds=new Set(d.folders.map(f=>f.id));
    d.items=d.items.filter(i=>{if(!i||!i.id)return false;if(i._kind==="ledgerEntry")return true;if(i.folderId&&!folderIds.has(i.folderId))return false;return true;});
    setData(d);
    setTimeout(()=>setBooting(false),900);
  },[]);
  useEffect(()=>{const h=()=>setWinW(window.innerWidth);window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);},[]);
  // 기존 로그인 세션 확인
  useEffect(()=>{(async()=>{
    if(sb){try{const {data}=await sb.auth.getSession();if(data?.session)setUser(data.session.user);}catch(e){}}
    setAuthChecked(true);
  })();},[]);
  // 로그인되면 클라우드에서 받아오기 (로컬보다 최신이면 덮어씀)
  const pulledRef=useRef(false);
  useEffect(()=>{(async()=>{
    if(!user||pulledRef.current)return;
    pulledRef.current=true;
    setSyncing(true);
    try{
      const remote=await cloudPull(user.id);
      const localMod=data._lastMod?new Date(data._lastMod).getTime():0;
      const remoteMod=remote&&remote.updated_at?new Date(remote.updated_at).getTime():0;
      const valid=remote&&remote.data&&Array.isArray(remote.data.folders)&&Array.isArray(remote.data.items);
      if(valid&&remoteMod>=localMod){
        if(remote.images){for(const[k,v]of Object.entries(remote.images)){try{await idbPut(k,v);}catch(e){}}}
        const rd=remote.data;
        if(!rd.folders.find(f=>f.id==="all"))rd.folders.unshift({...DEFAULT_DATA.folders[0]});
        setData(rd);saveData(rd);
        showToast("클라우드에서 불러왔어요 ☁️");
      }else{
        const imgs=await idbAll();const imgObj={};for(const[k,v]of Object.entries(imgs)){imgObj[k]=(typeof v==="string")?v:await blobToDataUrl(v);}
        await cloudPush(user.id,data,imgObj);
        if(valid)showToast("이 기기 기록이 더 최신이라 클라우드에 올렸어요 ☁️");
      }
    }catch(e){console.warn("동기화 오류:",e);setSyncFailed(true);}
    setSyncing(false);
  })();},[user]);
  // 데이터 바뀌면 클라우드로 자동 업로드 (1.2초 디바운스 + 실패 시 재시도)
  const pushTimer=useRef(null);
  const pendingPush=useRef(false);
  const doPush=async()=>{
    if(!user||!data)return false;
    pendingPush.current=false;
    setSyncing(true);
    try{
      const imgs=await idbAll();const imgObj={};for(const[k,v]of Object.entries(imgs)){imgObj[k]=(typeof v==="string")?v:await blobToDataUrl(v);}
      let ok=await cloudPush(user.id,data,imgObj);
      if(!ok){await new Promise(r=>setTimeout(r,1500));ok=await cloudPush(user.id,data,imgObj);} // 1회 재시도
      setSyncing(false);
      if(!ok){setSyncFailed(true);pendingPush.current=true;}
      else setSyncFailed(false);
      return ok;
    }catch(e){setSyncing(false);setSyncFailed(true);pendingPush.current=true;return false;}
  };
  useEffect(()=>{
    if(!user||!data||booting)return;
    pendingPush.current=true;
    if(pushTimer.current)clearTimeout(pushTimer.current);
    pushTimer.current=setTimeout(doPush,1200);
    return()=>{if(pushTimer.current)clearTimeout(pushTimer.current);};
  },[data,user]);
  // 앱을 닫거나 백그라운드로 갈 때, 저장 안 된 변경이 있으면 즉시 저장
  useEffect(()=>{
    if(!user)return;
    const flush=()=>{if(pendingPush.current){if(pushTimer.current)clearTimeout(pushTimer.current);doPush();}};
    const onHide=()=>{if(document.visibilityState==="hidden")flush();};
    document.addEventListener("visibilitychange",onHide);
    window.addEventListener("pagehide",flush);
    return()=>{document.removeEventListener("visibilitychange",onHide);window.removeEventListener("pagehide",flush);};
  },[user,data]);
  const isWide=winW>=900; // 데스크탑/넓은 화면
  const persist=(nd)=>{nd._lastMod=new Date().toISOString();setData(nd);const ok=saveData(nd);if(!ok)showToast("저장 공간이 부족해요. 사진을 줄이거나 백업 후 정리해보세요","err");};
  const updateSettings=(s)=>{setSettings(s);saveSettings(s);};
  const showToast=(msg,type="ok")=>{setToast({msg,type});setTimeout(()=>setToast(null),2500);};
  if(!data||booting||!authChecked)return <div style={{minHeight:"100vh",background:T.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:isWide?32:20,margin:"0 auto",position:"relative",overflow:"hidden"}}>
    <div style={{position:"fixed",inset:0,pointerEvents:"none",background:`radial-gradient(circle ${isWide?800:500}px at 50% 40%, #7C3AED44, #7C3AED11 45%, transparent 70%)`}}/>
    <div style={{fontSize:isWide?130:72,animation:"bootPop .7s cubic-bezier(.34,1.4,.5,1) both",filter:`drop-shadow(0 8px 24px #7C3AED66)`}}>📖</div>
    <div style={{fontFamily:"'Noto Serif KR',serif",fontSize:isWide?54:30,fontWeight:700,letterSpacing:"0.1em",color:T.text,animation:"fadeIn .6s ease .25s both"}}>GIROK</div>
    <div style={{display:"flex",gap:isWide?10:6,animation:"fadeIn .6s ease .45s both"}}>{[0,1,2].map(i=><div key={i} style={{width:isWide?11:7,height:isWide?11:7,borderRadius:"50%",background:"#C084FC",animation:`bootDot 1s ease ${i*0.15}s infinite`}}/>)}</div>
  </div>;

  // 로그인 안 됐고, 건너뛰기도 안 했으면 로그인 화면
  // 로그인은 선택 — 강제하지 않음. 설정에서 원할 때 로그인.
  if(showAuth)return <AuthScreen T={T} onAuthed={u=>{setUser(u);setShowAuth(false);}} onSkip={()=>setShowAuth(false)}/>;

  const activeFolder=data.folders.find(f=>f.id===activeFolderId);
  const isAllFolder=activeFolder?.folderType==="all";
  const itemsInFolder=(folder)=>folder.folderType==="all"?data.items.filter(i=>{const dt=data.folders.find(f=>f.id===i.folderId)?.folderType;return dt!=="diary"&&dt!=="ledger"&&!i._kind;}):data.items.filter(i=>i.folderId===folder.id&&!i._kind);
  const ledgerSubs=(ledgerFolderId)=>data.items.filter(i=>i._kind==="ledgerSub"&&i.folderId===ledgerFolderId).sort((a,b)=>(b.createdAt||"").localeCompare(a.createdAt||""));
  const folderItemCount=(folder)=>folder.folderType==="ledger"?ledgerSubs(folder.id).length:itemsInFolder(folder).length;
  const sortedFolders=(()=>{const arr=[...data.folders];const all=arr.filter(f=>f.folderType==="all");const rest=arr.filter(f=>f.folderType!=="all");const cmp=(a,b)=>{if(folderSort==="name")return a.name.localeCompare(b.name,"ko");if(folderSort==="count")return folderItemCount(b)-folderItemCount(a);return 0;};const pinned=rest.filter(f=>f.pinned).sort(cmp);const normal=rest.filter(f=>!f.pinned).sort(cmp);return [...all,...pinned,...normal];})();
  const togglePin=(folder)=>{persist({...data,folders:data.folders.map(f=>f.id===folder.id?{...f,pinned:!f.pinned}:f)});showToast(folder.pinned?"고정 해제":"📌 폴더를 위로 고정했어요");};
  const openFolder=(folder)=>{if(folder.locked&&!unlockedFolders[folder.id]){setPinTarget(folder);setModal("pin-unlock");}else{setActiveFolderId(folder.id);setView("items");setSearch("");}};
  const getItemDisplayType=(i)=>i._displayType||data.folders.find(f=>f.id===i.folderId)?.folderType||"movie";
  const isDiaryFolder=(folder)=>folder?.folderType==="diary";
  const folderStreak=(folder)=>folder.folderType==="diary"?calcStreak(data.items.filter(i=>i.folderId===folder.id)):0;
  const isLedgerFolder=(folder)=>folder?.folderType==="ledger";
  // 하위폴더(가계부) 목록은 위에서 정의됨 (folderItemCount보다 먼저)
  const ledgerEntries=(subId)=>data.items.filter(i=>i._kind==="ledgerEntry"&&i.ledgerSubId===subId);
  const ledgerSubTotal=(subId)=>{const es=ledgerEntries(subId);return {income:es.filter(e=>e.lType==="income").reduce((s,e)=>s+(e.amount||0),0),expense:es.filter(e=>e.lType==="expense").reduce((s,e)=>s+(e.amount||0),0)};};
  // 계좌별 잔액: 해당 ledger 폴더의 모든 하위폴더 거래 중 account 일치분 (accId=null이면 전체)

    {modal==="item"&&<ItemModal item={editTarget} folder={activeFolder||data.folders.find(f=>f.id==="all")} folders={data.folders} T={T} onImgError={msg=>showToast(msg,"err")} onClose={()=>{setModal(null);setEditTarget(null);}} onSave={(item)=>{persist({...data,items:editTarget?data.items.map(i=>i.id===item.id?item:i):[item,...data.items]});setModal(null);setEditTarget(null);}}/>}
    {modal==="pin-unlock"&&pinTarget&&<PinModal title={`🔒 ${pinTarget.name}`} mode="enter" T={T} onCancel={()=>{setModal(null);setPinTarget(null);}} onConfirm={(pin)=>{if(pin===pinTarget.pin){setUnlockedFolders(u=>({...u,[pinTarget.id]:true}));setActiveFolderId(pinTarget.id);setView("items");setModal(null);setPinTarget(null);}else{setModal(null);setPinTarget(null);showToast("PIN이 틀렸어요","err");}}}/>}
    {modal==="pin-set"&&pinTarget&&<PinModal title="PIN 설정" mode="set" T={T} onCancel={()=>{setModal(null);setPinTarget(null);}} onConfirm={(pin)=>{persist({...data,folders:data.folders.map(f=>f.id===pinTarget.id?{...f,pin}:f)});setUnlockedFolders(u=>({...u,[pinTarget.id]:true}));setModal(null);setPinTarget(null);showToast("잠금 폴더 설정 완료 🔒");}}/>}
    {modal==="diary"&&<DiaryModal entry={editTarget} folderId={activeFolderId} T={T} onImgError={msg=>showToast(msg,"err")} onClose={()=>{setModal(null);setEditTarget(null);}} onSave={(entry)=>{persist({...data,items:editTarget?data.items.map(i=>i.id===entry.id?entry:i):[entry,...data.items]});setModal(null);setEditTarget(null);showToast(editTarget?"일기 수정 완료":"오늘 일기 저장 🔥");}}/>}
    {detailItem&&<DetailView item={detailItem} folderType={getItemDisplayType(detailItem)} wide={isWide} T={T} onClose={()=>setDetailItem(null)} onEdit={i=>{setDetailItem(null);setEditTarget(i);setActiveFolderId(i.folderId);setModal("item");}}/>}
    {diaryDetail&&<DiaryDetail entry={diaryDetail} wide={isWide} T={T} onClose={()=>setDiaryDetail(null)} onEdit={e=>{setDiaryDetail(null);setEditTarget(e);setModal("diary");}}/>}
    {ledgerSub&&<LedgerSubView sub={data.items.find(i=>i.id===ledgerSub.id)||ledgerSub} entries={ledgerEntries(ledgerSub.id)} accounts={activeFolder?.accounts||[]} customCats={activeFolder?.customCats} wide={isWide} T={T} onClose={()=>setLedgerSub(null)} onAddEntry={()=>{setEditTarget(null);setModal("ledgerEntry");}} onEditEntry={e=>{setEditTarget(e);setModal("ledgerEntry");}} onManageBudget={()=>setModal("budget")} onOpenStats={()=>setLedgerStats(ledgerSub)} onDeleteEntry={(id)=>{const doDel=()=>{persist({...data,items:data.items.filter(i=>i.id!==id)});setConfirmCfg(null);};if(settings.confirmDelete)askConfirm({title:"기록 삭제",message:"이 기록을 삭제할까요?",onConfirm:doDel});else doDel();}}/>}
    {ledgerStats&&<LedgerStats sub={data.items.find(i=>i.id===ledgerStats.id)||ledgerStats} entries={ledgerEntries(ledgerStats.id)} customCats={activeFolder?.customCats} wide={isWide} T={T} onClose={()=>setLedgerStats(null)}/>}
    {modal==="renameSub"&&renameSub&&<RenameModal title={renameSub.title} T={T} onClose={()=>{setModal(null);setRenameSub(null);}} onSave={(newTitle)=>{persist({...data,items:data.items.map(i=>i.id===renameSub.id?{...i,title:newTitle}:i)});setModal(null);setRenameSub(null);showToast("이름을 바꿨어요");}}/>}
    {modal==="ledgerSub"&&<LedgerSubModal fixedCount={(activeFolder?.fixedExpenses||[]).length} T={T} onClose={()=>setModal(null)} onSave={(title)=>{const subId=uid();const fixed=activeFolder?.fixedExpenses||[];const defAcc=(activeFolder?.accounts||[])[0]?.id||null;const today2=new Date().toISOString().slice(0,10);const sub={id:subId,_kind:"ledgerSub",folderId:activeFolderId,title,createdAt:new Date().toISOString()};const fixedEntries=fixed.map(f=>({id:uid(),_kind:"ledgerEntry",ledgerSubId:subId,lType:f.kind==="income"?"income":"expense",lCat:f.kind==="income"?"salary":"sub",account:defAcc,amount:f.amount,memo:f.name,lDate:today2,isFixed:true,createdAt:new Date().toISOString()}));persist({...data,items:[sub,...fixedEntries,...data.items]});setModal(null);showToast("가계부를 만들었어요 💰");}}/>}
    {modal==="ledgerEntry"&&ledgerSub&&<LedgerEntryModal entry={editTarget} subId={ledgerSub.id} accounts={activeFolder?.accounts||[]} customCats={activeFolder?.customCats} onManageCats={()=>setModal("categories")} T={T} onClose={()=>{setModal(null);setEditTarget(null);}} onSave={(entry)=>{persist({...data,items:editTarget?data.items.map(i=>i.id===entry.id?entry:i):[entry,...data.items]});setModal(null);setEditTarget(null);}}/>}
    {modal==="categories"&&activeFolder&&<CategoryModal customCats={activeFolder.customCats} T={T} onClose={()=>setModal(ledgerSub?"ledgerEntry":null)} onSave={(cc)=>{persist({...data,folders:data.folders.map(f=>f.id===activeFolderId?{...f,customCats:cc}:f)});setModal(ledgerSub?"ledgerEntry":null);showToast("카테고리를 저장했어요 🏷️");}}/>}
    {modal==="budget"&&ledgerSub&&<BudgetModal sub={data.items.find(i=>i.id===ledgerSub.id)||ledgerSub} customCats={activeFolder?.customCats} T={T} onClose={()=>setModal(null)} onSave={(budgets)=>{persist({...data,items:data.items.map(i=>i.id===ledgerSub.id?{...i,budgets}:i)});setModal(null);showToast("예산을 저장했어요 🎯");}}/>}
    {modal==="accounts"&&activeFolder&&<AccountModal accounts={activeFolder.accounts||[]} T={T} onClose={()=>setModal(null)} onSave={(list)=>{const validIds=list.map(a=>a.id);const firstId=list[0]?list[0].id:null;const subIds=data.items.filter(i=>i._kind==="ledgerSub"&&i.folderId===activeFolderId).map(s=>s.id);const newItems=data.items.map(i=>{if(i._kind!=="ledgerEntry"||!subIds.includes(i.ledgerSubId))return i;if(i.lType==="transfer"){const nf=validIds.includes(i.fromAccount)?i.fromAccount:firstId;const nt=validIds.includes(i.toAccount)?i.toAccount:firstId;return {...i,fromAccount:nf,toAccount:nt};}if(i.account&&!validIds.includes(i.account))return {...i,account:firstId};return i;});persist({...data,items:newItems,folders:data.folders.map(f=>f.id===activeFolderId?{...f,accounts:list}:f)});setModal(null);showToast("계좌를 저장했어요 💳");}}/>}
    {modal==="fixedExpense"&&activeFolder&&<FixedExpenseModal fixedExpenses={activeFolder.fixedExpenses||[]} T={T} onClose={()=>setModal(null)} onSave={(list)=>{persist({...data,folders:data.folders.map(f=>f.id===activeFolderId?{...f,fixedExpenses:list}:f)});setModal(null);showToast("고정 지출을 저장했어요");}}/>}
    {confirmCfg&&<ConfirmDialog {...confirmCfg} T={T} onCancel={()=>setConfirmCfg(null)}/>}
  </>);
}

class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(err){return {err};}
  componentDidCatch(err,info){console.error("앱 오류:",err,info);}
  render(){
    if(this.state.err){
      return <div style={{minHeight:"100vh",background:"#0B0A0F",color:"#F4F2F7",display:"flex",alignItems:"center",justifyContent:"center",padding:"24px",fontFamily:"'Noto Sans KR',sans-serif"}}>
        <div style={{textAlign:"center",maxWidth:340}}>
          <div style={{fontSize:52,marginBottom:16}}>🛠️</div>
          <div style={{fontFamily:"'Noto Serif KR',serif",fontSize:20,fontWeight:700,marginBottom:10}}>잠깐 문제가 생겼어요</div>
          <div style={{fontSize:14,color:"#A8A2B8",lineHeight:1.7,marginBottom:24}}>걱정 마세요, 기록은 안전하게 저장돼 있어요.<br/>아래 버튼으로 다시 시작할 수 있어요.</div>
          <button onClick={()=>{this.setState({err:null});location.reload();}} style={{background:"linear-gradient(135deg,#7C3AED,#C084FC)",border:"none",borderRadius:14,color:"#fff",padding:"14px 28px",fontSize:15,fontWeight:700,cursor:"pointer",width:"100%"}}>다시 시작하기</button>
          <div style={{fontSize:11,color:"#5C5668",marginTop:16}}>계속 문제가 생기면, 앱을 완전히 닫았다 열어보세요</div>
        </div>
      </div>;
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
